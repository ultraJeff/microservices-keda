apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-producer
  namespace: keda-demo
  labels:
    app: kafka-producer
    app.kubernetes.io/part-of: demo-1-kafka
    app.openshift.io/runtime: nodejs
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"kafka.strimzi.io/v1beta2","kind":"Kafka","name":"my-cluster"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-producer
  template:
    metadata:
      labels:
        app: kafka-producer
    spec:
      containers:
        - name: producer
          image: image-registry.openshift-image-registry.svc:5000/keda-demo/kafka-producer:latest
          ports:
            - containerPort: 3000
          env:
            - name: KAFKA_BROKERS
              value: my-cluster-kafka-bootstrap:9092
            - name: KAFKA_TOPIC
              value: orders
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-producer
  namespace: keda-demo
spec:
  selector:
    app: kafka-producer
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kafka-producer
  namespace: keda-demo
spec:
  to:
    kind: Service
    name: kafka-producer
  port:
    targetPort: 3000
