apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: job-worker-scaler
  namespace: keda-demo
spec:
  scaleTargetRef:
    name: job-worker
  pollingInterval: 5
  cooldownPeriod: 30
  minReplicaCount: 0
  maxReplicaCount: 5
  triggers:
    - type: postgresql
      metadata:
        query: "SELECT COUNT(*)::int FROM jobs WHERE status = 'pending'"
        targetQueryValue: "5"
        activationTargetQueryValue: "1"
      authenticationRef:
        name: postgresql-trigger-auth
