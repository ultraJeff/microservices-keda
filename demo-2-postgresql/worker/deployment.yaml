apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-worker
  namespace: keda-demo
  labels:
    app: job-worker
    app.kubernetes.io/part-of: demo-2-postgresql
    app.openshift.io/runtime: nodejs
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"Deployment","name":"postgresql"}]'
spec:
  replicas: 0
  selector:
    matchLabels:
      app: job-worker
  template:
    metadata:
      labels:
        app: job-worker
    spec:
      containers:
        - name: worker
          image: image-registry.openshift-image-registry.svc:5000/keda-demo/job-worker:latest
          env:
            - name: DB_HOST
              value: postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: demodb
            - name: DB_USER
              value: demo
            - name: DB_PASSWORD
              value: demo
            - name: POLL_INTERVAL_MS
              value: "2000"
            - name: PROCESSING_TIME_MS
              value: "3000"
            - name: BATCH_SIZE
              value: "5"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
