apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-api
  namespace: keda-demo
  labels:
    app: job-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-api
  template:
    metadata:
      labels:
        app: job-api
    spec:
      containers:
        - name: api
          image: image-registry.openshift-image-registry.svc:5000/keda-demo/job-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: demodb
            - name: DB_USER
              value: demo
            - name: DB_PASSWORD
              value: demo
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: job-api
  namespace: keda-demo
spec:
  selector:
    app: job-api
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: job-api
  namespace: keda-demo
spec:
  to:
    kind: Service
    name: job-api
  port:
    targetPort: 3000
