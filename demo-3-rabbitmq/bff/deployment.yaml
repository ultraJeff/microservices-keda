apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-bff
  namespace: keda-demo
  labels:
    app: notification-bff
    app.kubernetes.io/part-of: demo-3-rabbitmq
    app.openshift.io/runtime: nodejs
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"Deployment","name":"rabbitmq"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-bff
  template:
    metadata:
      labels:
        app: notification-bff
    spec:
      containers:
        - name: notification-bff
          image: image-registry.openshift-image-registry.svc:5000/keda-demo/notification-bff:latest
          ports:
            - containerPort: 3000
          env:
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
            - name: QUEUE_NAME
              value: notifications
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-bff
  namespace: keda-demo
spec:
  selector:
    app: notification-bff
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: notification-bff
  namespace: keda-demo
spec:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: notification-bff
  port:
    targetPort: 3000
