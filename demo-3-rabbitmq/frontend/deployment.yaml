apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-frontend
  namespace: keda-demo
  labels:
    app: notification-frontend
    app.kubernetes.io/part-of: demo-3-rabbitmq
    app.openshift.io/runtime: nodejs
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"Deployment","name":"notification-bff"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-frontend
  template:
    metadata:
      labels:
        app: notification-frontend
    spec:
      containers:
        - name: notification-frontend
          image: image-registry.openshift-image-registry.svc:5000/keda-demo/notification-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: BFF_URL
              value: http://notification-bff:3000
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-frontend
  namespace: keda-demo
spec:
  selector:
    app: notification-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: notification-frontend
  namespace: keda-demo
spec:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: notification-frontend
  port:
    targetPort: 3000
