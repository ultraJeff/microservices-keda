<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — Micro-Frontend</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e2e4ea; --muted: #8b8fa3;
    --accent: #ff7043; --accent-dim: #3d1f10;
    --green: #66bb6a; --orange: #ffa726;
  }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 16px; min-height: 100vh; }

  .mfe-badge {
    display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    background: var(--accent-dim); color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px;
    margin-left: 8px; vertical-align: middle;
  }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header h2 { font-size: 15px; font-weight: 600; }

  .btn {
    border: none; padding: 8px 18px; border-radius: 8px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; background: var(--accent); color: #fff;
  }
  .btn:hover:not(:disabled) { background: #ff8a65; }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat {
    background: var(--surface); border-radius: 8px; padding: 12px 14px;
    border: 1px solid var(--border);
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

  .feed-wrap {
    flex: 1; background: var(--surface); border-radius: 8px; border: 1px solid var(--border);
    overflow: hidden; display: flex; flex-direction: column;
    max-height: calc(100vh - 200px);
  }
  .feed-header {
    font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px;
    padding: 10px 14px 6px; flex-shrink: 0;
  }
  .feed { flex: 1; overflow-y: auto; padding: 0 14px 10px; }
  .feed::-webkit-scrollbar { width: 4px; }
  .feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .feed-item {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    border-bottom: 1px solid var(--border); font-size: 11px;
    animation: fadeIn 0.3s ease;
  }
  .feed-item:last-child { border-bottom: none; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .feed-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--accent); box-shadow: 0 0 6px rgba(255,112,67,0.4); }
  .feed-dot.delivered { background: var(--green); box-shadow: 0 0 6px rgba(102,187,106,0.4); }
  .feed-recipient { color: var(--text); flex: 1; }
  .feed-type { color: var(--muted); font-size: 10px; }
  .feed-time { color: var(--muted); font-size: 10px; flex-shrink: 0; }
  .feed-empty { color: var(--muted); font-size: 11px; padding: 20px 0; text-align: center; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <h2>Notifications <span class="mfe-badge">Micro-Frontend</span></h2>
  <button class="btn" id="sendBtn" onclick="sendNotifications()">Send 30 Notifications</button>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Queue Depth</div>
    <div class="stat-value" id="queueDepth">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Active Workers</div>
    <div class="stat-value" id="workerCount">0</div>
  </div>
</div>

<div class="feed-wrap">
  <div class="feed-header">Recent Notifications</div>
  <div class="feed" id="feed"><div class="feed-empty">No notifications yet...</div></div>
</div>

<script>
function connect() {
  const es = new EventSource('/api/stream');

  es.onmessage = (e) => {
    const d = JSON.parse(e.data);
    document.getElementById('queueDepth').textContent = d.stats.messages || 0;
    document.getElementById('workerCount').textContent = d.stats.consumers || 0;

    const feed = document.getElementById('feed');
    if (d.recent && d.recent.length > 0) {
      feed.innerHTML = d.recent.map(n => {
        const time = new Date(n.timestamp).toLocaleTimeString();
        const cls = n.status === 'delivered' ? 'delivered' : '';
        return `<div class="feed-item">
          <span class="feed-dot ${cls}"></span>
          <span class="feed-recipient">${n.recipient}</span>
          <span class="feed-type">${n.type}</span>
          <span class="feed-time">${time}</span>
        </div>`;
      }).join('');
    }
  };

  es.onerror = () => {
    es.close();
    setTimeout(connect, 3000);
  };
}
connect();

async function sendNotifications() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    await fetch('/api/send', { method: 'POST' });
  } finally {
    btn.textContent = 'Send 30 Notifications';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
