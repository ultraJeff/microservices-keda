apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-pvc
  namespace: keda-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: keda-demo
data:
  init-db.sh: |
    psql -d demodb -c "
      CREATE TABLE IF NOT EXISTS jobs (
        id SERIAL PRIMARY KEY,
        payload JSONB NOT NULL,
        status VARCHAR(20) NOT NULL DEFAULT 'pending',
        created_at TIMESTAMP DEFAULT NOW(),
        started_at TIMESTAMP,
        completed_at TIMESTAMP
      );
      CREATE INDEX IF NOT EXISTS idx_jobs_status ON jobs (status);
    "
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: keda-demo
  labels:
    app: postgresql
    app.kubernetes.io/part-of: demo-2-postgresql
    app.openshift.io/runtime: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: demo
            - name: POSTGRESQL_PASSWORD
              value: demo
            - name: POSTGRESQL_DATABASE
              value: demodb
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
            - name: init-sql
              mountPath: /opt/app-root/src/postgresql-start/
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgresql-pvc
        - name: init-sql
          configMap:
            name: postgresql-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: keda-demo
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
