apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  namespace: keda-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-reader
  namespace: keda-demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["list", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-reader-binding
  namespace: keda-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dashboard-reader
subjects:
  - kind: ServiceAccount
    name: dashboard
    namespace: keda-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: keda-demo
  labels:
    app: dashboard
    app.kubernetes.io/part-of: keda-dashboard
    app.openshift.io/runtime: nodejs
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"Deployment","name":"kafka-producer"},{"apiVersion":"apps/v1","kind":"Deployment","name":"job-api"},{"apiVersion":"apps/v1","kind":"Deployment","name":"notification-bff"},{"apiVersion":"apps/v1","kind":"Deployment","name":"notification-frontend"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      serviceAccountName: dashboard
      containers:
        - name: dashboard
          image: image-registry.openshift-image-registry.svc:5000/keda-demo/dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: KAFKA_BROKERS
              value: my-cluster-kafka-bootstrap:9092
            - name: KAFKA_TOPIC
              value: orders
            - name: KAFKA_GROUP
              value: order-processors
            - name: NAMESPACE
              value: keda-demo
            - name: DB_HOST
              value: postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: demodb
            - name: DB_USER
              value: demo
            - name: DB_PASSWORD
              value: demo
            - name: NOTIFICATION_BFF_URL
              value: http://notification-bff:3000
            - name: NOTIFICATION_MFE_URL
              value: PLACEHOLDER
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: keda-demo
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dashboard
  namespace: keda-demo
spec:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: dashboard
  port:
    targetPort: 3000
